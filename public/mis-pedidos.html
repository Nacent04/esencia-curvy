<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Mis Compras | ESENCIA CURVY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #4A3728;
            --primary-light: #6B5344;
            --secondary: #D4A373;
            --bg-light: #FEFAE0;
            --bg-white: #FFFFFF;
            --text-dark: #4A3728;
            --text-light: #8B7355;
            --success: #4CAF50;
            --danger: #F44336;
            --warning: #B45309;
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.08);
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
        }
        .header {
            background: var(--bg-white); padding: 16px 20px; box-shadow: var(--shadow-md);
            display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100;
        }
        .header h1 { font-size: 20px; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .back-btn {
            background: none; border: none; font-size: 22px; color: var(--text-light);
            cursor: pointer; padding: 8px; border-radius: 50%; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
        }
        .back-btn:hover { background: #F0E6DC; color: var(--text-dark); }

        .container { max-width: 700px; width: 100%; margin: 24px auto; padding: 0 16px 60px; }

        .pedido-card {
            background: var(--bg-white); border-radius: 22px; padding: 20px;
            margin-bottom: 18px; box-shadow: var(--shadow-md);
        }
        .pedido-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 10px; flex-wrap: wrap; }
        .pedido-id { font-weight: 800; font-size: 15px; color: var(--primary); display: block; }
        .pedido-fecha { font-size: 12px; color: var(--text-light); }
        .estado-badge { padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }

        .pedido-items { border-top: 1px dashed #F0E6DC; border-bottom: 1px dashed #F0E6DC; padding: 12px 0; margin-bottom: 12px; }
        .pedido-item-row { display: flex; align-items: center; gap: 12px; padding: 6px 0; }
        .pedido-item-row img { width: 44px; height: 52px; object-fit: cover; border-radius: 8px; background: #FAEDCD; }
        .pedido-item-info { flex: 1; display: flex; flex-direction: column; }
        .pedido-item-info strong { font-size: 13px; }
        .pedido-item-info span { font-size: 11px; color: var(--text-light); }
        .pedido-item-precio { font-size: 13px; font-weight: 700; color: var(--primary); }

        .pedido-footer { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--text-light); }
        .pedido-total { font-size: 17px; color: var(--primary); }

        .pin-box {
            margin-top: 14px; background: #FFF8E1; border: 1px solid #FFE082; color: var(--warning);
            padding: 12px 16px; border-radius: 14px; font-size: 13px; text-align: center;
        }

        .comprobante-box { margin-top: 14px; border-radius: 14px; padding: 14px 16px; font-size: 13px; }
        .comprobante-box.pendiente { background: #FEE2E2; color: #991B1B; }
        .comprobante-box.enviado { background: #F0FDF4; color: #065f46; }
        .comprobante-box p { margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .comprobante-thumb { max-width: 140px; border-radius: 10px; cursor: pointer; border: 2px solid rgba(0,0,0,0.05); }

        .btn-outline {
            background: white; border: 2px solid #991B1B; color: #991B1B; padding: 10px 18px;
            border-radius: 40px; font-weight: 700; font-size: 12px; cursor: pointer; display: inline-flex;
            align-items: center; gap: 8px; transition: all 0.2s;
        }
        .btn-outline:hover { background: #991B1B; color: white; }

        .btn-confirm {
            padding: 16px; background: var(--primary); color: white; border: none; border-radius: 50px;
            font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 10px; width: 100%; transition: all 0.3s;
        }
        .btn-confirm:hover { background: var(--primary-light); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-light); }
        .empty-state i { font-size: 52px; color: var(--secondary); margin-bottom: 16px; }
        .empty-state h3 { color: var(--text-dark); margin-bottom: 8px; }

        .toast {
            position: fixed; bottom: 20px; right: 20px; background: var(--success);
            color: white; padding: 14px 20px; border-radius: 40px; font-weight: 600;
            font-size: 14px; z-index: 2000; box-shadow: var(--shadow-lg); animation: slideIn 0.3s;
        }
        .toast.error { background: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='/tienda'">
            <i class="fas fa-arrow-left"></i>
        </button>
        <h1><i class="fas fa-receipt"></i> Mis Compras</h1>
    </div>

    <div class="container" id="lista-pedidos">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Cargando tus compras...</p></div>
    </div>

    <div id="toast-container"></div>

    <script>
        let misPedidos = [];
        const fmt = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 });

        const ESTADOS_LABEL = {
            pendiente: 'Pendiente de confirmación',
            confirmado: 'Confirmado - a la espera de pago',
            abonado: 'Pago confirmado',
            enviado: 'Enviado',
            entregado: 'Entregado',
            cancelado: 'Cancelado'
        };
        const ESTADOS_COLOR = {
            pendiente: 'background:#FEF3C7;color:#B45309',
            confirmado: 'background:#D4A373;color:#fff',
            abonado: 'background:#E8DCD2;color:#4A3728',
            enviado: 'background:#E0A899;color:#fff',
            entregado: 'background:#4A3728;color:#fff',
            cancelado: 'background:#FEE2E2;color:#991B1B'
        };

        function sanitizarUrlImagen(url) {
            if (!url) return 'https://via.placeholder.com/50x60/FAEDCD/4A3728?text=Curvy';
            if (url.startsWith('/uploads/') || url.startsWith('http')) return url;
            return url;
        }

        async function cargarMisPedidos() {
            const token = localStorage.getItem('token');
            if (!token) { window.location.href = '/login'; return; }
            try {
                const res = await fetch('/api/mis-pedidos', { headers: { 'Authorization': `Bearer ${token}` } });
                if (!res.ok) throw new Error();
                const data = await res.json();
                misPedidos = data.lista || [];
                renderizarPedidos();
            } catch(e) {
                document.getElementById('lista-pedidos').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>No se pudieron cargar tus compras</h3><p>Intentá de nuevo más tarde.</p></div>';
            }
        }

        function renderizarPedidos() {
            const cont = document.getElementById('lista-pedidos');
            if (!misPedidos.length) {
                cont.innerHTML = `<div class="empty-state">
                    <i class="fas fa-shopping-bag"></i>
                    <h3>Todavía no hiciste ninguna compra</h3>
                    <p>Cuando compres algo en la tienda, vas a ver el estado de tu pedido acá.</p>
                    <button class="btn-confirm" style="max-width:260px;margin:20px auto 0" onclick="window.location.href='/tienda'"><i class="fas fa-store"></i> Ir a la Tienda</button>
                </div>`;
                return;
            }

            cont.innerHTML = misPedidos.map(p => {
                const estadoStyle = ESTADOS_COLOR[p.estado] || 'background:#eee;color:#333';
                const estadoLabel = ESTADOS_LABEL[p.estado] || p.estado;
                const esEnvio = p.tipoEntrega === 'envio';
                const necesitaComprobante = !p.clienteConfirmoPago && (p.estado === 'pendiente' || p.estado === 'confirmado');
                const comprobanteEnviadoEsperando = p.clienteConfirmoPago && (p.estado === 'pendiente' || p.estado === 'confirmado');

                return `
                <div class="pedido-card">
                    <div class="pedido-header">
                        <div>
                            <span class="pedido-id">${p.id}</span>
                            <span class="pedido-fecha">${p.fecha}</span>
                        </div>
                        <span class="estado-badge" style="${estadoStyle}">${estadoLabel}</span>
                    </div>

                    <div class="pedido-items">
                        ${p.items.map(i => `
                            <div class="pedido-item-row">
                                <img src="${sanitizarUrlImagen(i.vFoto)}" onerror="this.src='https://via.placeholder.com/44x52/FAEDCD/4A3728?text=Moda'">
                                <div class="pedido-item-info">
                                    <strong>${i.pNom}</strong>
                                    <span>${i.vNom} · x${i.cant}</span>
                                </div>
                                <span class="pedido-item-precio">${fmt.format(i.precio * i.cant)}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="pedido-footer">
                        <span>${esEnvio ? '🚚 Envío a domicilio' : '🏪 Retiro en local'}</span>
                        <strong class="pedido-total">${fmt.format(p.total)}</strong>
                    </div>

                    ${p.pin && p.estado === 'abonado' ? `
                        <div class="pin-box">
                            <i class="fas fa-key"></i> Código para retirar tu pedido: <strong>${p.pin}</strong>
                        </div>` : ''}

                    ${necesitaComprobante ? `
                        <div class="comprobante-box pendiente">
                            <p><i class="fas fa-exclamation-circle"></i> <strong>Pendiente:</strong> todavía no subiste el comprobante de pago.</p>
                            <input type="file" id="file-${p.id}" accept="image/*" style="display:none" onchange="subirComprobanteDesdeLista('${p.id}', this)">
                            <button class="btn-outline" onclick="document.getElementById('file-${p.id}').click()"><i class="fas fa-upload"></i> Subir Comprobante</button>
                        </div>` : ''}

                    ${comprobanteEnviadoEsperando ? `
                        <div class="comprobante-box enviado">
                            <p><i class="fas fa-clock"></i> Comprobante enviado. Esperando confirmación del local.</p>
                            ${p.comprobanteUrl ? `<img src="${p.comprobanteUrl}" class="comprobante-thumb" onclick="window.open('${p.comprobanteUrl}','_blank')">` : ''}
                        </div>` : ''}
                </div>`;
            }).join('');
        }

        async function subirComprobanteDesdeLista(pedidoId, input) {
            const file = input.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                mostrarToast('❌ El comprobante debe ser una imagen', true);
                return;
            }
            const token = localStorage.getItem('token');
            const fd = new FormData();
            fd.append('comprobante', file);
            fd.append('pedidoId', pedidoId);
            mostrarToast('📤 Subiendo comprobante...');
            try {
                const res = await fetch('/tienda/subir-comprobante', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: fd
                });
                const data = await res.json();
                if (data.success) {
                    mostrarToast('✅ Comprobante enviado con éxito');
                    cargarMisPedidos();
                } else {
                    mostrarToast('❌ ' + (data.error || 'No se pudo subir'), true);
                }
            } catch(e) {
                mostrarToast('❌ Error de red', true);
            }
        }

        function mostrarToast(mensaje, esError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${esError ? 'error' : ''}`;
            toast.innerHTML = mensaje;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        document.addEventListener('DOMContentLoaded', cargarMisPedidos);
    </script>
</body>
</html>
