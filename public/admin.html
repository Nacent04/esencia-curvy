async function cargarRendimientoHistoricoData(pid) {
    const desde = document.getElementById(`rh-desde-${pid}`)?.value || '';
    const hasta = document.getElementById(`rh-hasta-${pid}`)?.value || '';
    
    try {
        const d = await safeFetch('/admin/rendimiento-historico', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ productoId: pid, desde, hasta })
        });
        
        const body = document.getElementById('rendimiento-historico-body');
        if (!body) return;
        
        if (!d.ventas?.length) {
            body.innerHTML = '<p style="text-align:center;color:#8B7355;padding:20px">Sin ventas registradas</p>';
            return;
        }
        
        let totalMenor = 0, totalMayor = 0, cantMenor = 0, cantMayor = 0;
        let ganTotal = 0;
        
        let html = `<table style="width:100%;border-collapse:collapse;margin-bottom:16px">
            <thead><tr style="background:#FEFAE0">
                <th style="padding:8px;font-size:11px">Fecha</th>
                <th style="padding:8px;font-size:11px">Venta</th>
                <th style="padding:8px;font-size:11px">Cant</th>
                <th style="padding:8px;font-size:11px">P.Unit</th>
                <th style="padding:8px;font-size:11px">Costo</th>
                <th style="padding:8px;font-size:11px">Ganancia</th>
                <th style="padding:8px;font-size:11px">Tipo</th>
            </tr></thead><tbody>`;
        
        d.ventas.forEach(v => {
            const esMayorista = v.esMayorista || v.precio < (v.precioOriginal || v.precio);
            const tipo = esMayorista ? 'Mayorista' : 'Minorista';
            const gan = v.precio - (v.costo || 0);
            
            html += `<tr style="border-bottom:1px solid #FAEDCD">
                <td style="padding:8px;font-size:11px">${v.fecha?.substring(0,10)}</td>
                <td style="padding:8px;font-size:11px">${v.ventaId}</td>
                <td style="padding:8px;font-size:11px;text-align:center">${v.amount || v.cant || 1}</td>
                <td style="padding:8px;font-size:11px">${fmt.format(v.precio)}</td>
                <td style="padding:8px;font-size:11px">${fmt.format(v.costo||0)}</td>
                <td style="padding:8px;font-size:11px;color:${gan>=0?'#10b981':'#ef4444'};font-weight:600">${fmt.format(gan)}</td>
                <td style="padding:8px;font-size:10px"><span style="background:${esMayorista?'#D4A373':'#4A3728'};color:white;padding:2px 6px;border-radius:10px">${tipo}</span></td>
            </tr>`;
            
            const currentAmount = v.amount || v.cant || 1;
            if (esMayorista) { totalMayor += v.precio * currentAmount; cantMayor += currentAmount; }
            else { totalMenor += v.precio * currentAmount; cantMenor += currentAmount; }
            ganTotal += gan * currentAmount;
        });
        
        html += `</tbody></table>
        <div style="background:#FEFAE0;border-radius:12px;padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div><strong>Minorista:</strong> ${cantMenor} vendidos - ${fmt.format(totalMenor)}</div>
            <div><strong>Mayorista:</strong> ${cantMayor} vendidos - ${fmt.format(totalMayor)}</div>
            <div style="font-size:16px;font-weight:700;color:#10b981">💰 Ganancia Total: ${fmt.format(ganTotal)}</div>
            <div style="font-size:13px;color:#8B7355">📦 Total: ${cantMenor + cantMayor} unidades</div>
        </div>`;
        
        body.innerHTML = html;
    } catch(e) {
        console.error(e);
    }
}
    
function toggleThemePanel(){const p=document.getElementById('theme-panel');if(p)p.style.display=p.style.display==='block'?'none':'block';}
function toggleDarkMode(){document.body.classList.toggle('dark-mode');localStorage.setItem('darkMode',document.body.classList.contains('dark-mode'));}
if(localStorage.getItem('darkMode')==='true'){document.body.classList.add('dark-mode');}
</script>
